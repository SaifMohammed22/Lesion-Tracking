# Default configuration for lesion tracking

tracking:
  # Minimum overlap ratio to consider lesions as matched (0-1)
  overlap_threshold: 0.3
  
  # Maximum centroid distance for matching (in mm)
  distance_threshold_mm: 10.0
  
  # Relative volume increase threshold to classify as 'growing'
  growth_threshold: 0.20
  
  # Relative volume decrease threshold to classify as 'shrinking'
  shrink_threshold: 0.20

labeling:
  # Minimum number of voxels to consider as a valid lesion
  min_lesion_voxels: 3
  
  # Connectivity for connected component analysis (6, 18, or 26)
  # 6: face connectivity only
  # 18: face and edge connectivity
  # 26: full connectivity (face, edge, corner)
  connectivity: 26
  
  # If true, lesion labels are assigned by descending volume
  sort_by_size: true

registration:
  # Whether to check registration quality before tracking
  check_alignment: true
  
  # Correlation threshold to consider images well-aligned
  alignment_threshold: 0.8

visualization:
  # Default figure size (width, height)
  figsize: [12, 8]
  
  # DPI for saved figures
  dpi: 150
  
  # Number of slices for multi-slice visualization
  n_slices: 9
  
  # Overlay transparency (0-1)
  overlay_alpha: 0.5
  
  # Category colors (hex)
  category_colors:
    stable: "#4CAF50"
    growing: "#F44336"
    shrinking: "#2196F3"
    new: "#FF9800"
    resolved: "#9C27B0"

output:
  # Whether to save labeled masks
  save_labeled_masks: true
  
  # Whether to generate visualization figures
  generate_visualizations: true
  
  # Whether to save lesion details as CSV
  save_csv: true
  
  # Whether to save JSON tracking results
  save_json: true
  
  # Whether to generate text report
  save_text_report: true
